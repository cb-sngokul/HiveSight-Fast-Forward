# HiveSight - Chargebee Configuration
# Set via login page or environment variables (CHARGEBEE_SITE, CHARGEBEE_API_KEY)
chargebee.site=${CHARGEBEE_SITE:}
chargebee.api-key=${CHARGEBEE_API_KEY:}
# Timezone for display. Set to match your Chargebee site (Settings > Business Profile > Time zone).
# Chargebee does not expose site timezone via API, so you must configure it here.
chargebee.timezone=${CHARGEBEE_TIMEZONE:Asia/Kolkata}
# Optional: default tax rate for subscription details card (e.g. 10 for 10%)
# chargebee.default-tax-rate=10

# AI - Groq (free) or grok (xAI). Keys look similar - Groq=console.groq.com, Grok=console.x.ai
ai.provider=${AI_PROVIDER:groq}

# Groq (FREE). Get key at https://console.groq.com - keys often start with gsk_
ai.groq.api-key=${AI_GROQ_API_KEY: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}
ai.groq.model=llama-3.1-8b-instant

# xAI Grok. Get key at https://console.x.ai (different from Groq!)
ai.grok.api-key=${AI_GROK_API_KEY:}
ai.grok.model=grok-3-mini

# OpenAI (quota limited)
ai.openai.api-key=${AI_OPENAI_API_KEY:}
ai.openai.model=gpt-4o-mini

# Google Gemini (FREE). Get key at https://aistudio.google.com/apikey
ai.gemini.api-key=${AI_GEMINI_API_KEY:}
ai.gemini.model=gemini-1.5-flash

server.port=${SERVER_PORT:8766}
